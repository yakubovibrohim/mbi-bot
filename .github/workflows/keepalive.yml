name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render servislari
        run: |
          FAILED=""
          for URL in \
            "https://mbi-jarvis.onrender.com/" \
            "https://mbi-bot-yw9q.onrender.com/" \
            "https://mbi-tannarx-bot.onrender.com/" ; do
            STATUS=$(curl -s -o /dev/null -m 60 -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ $URL — $STATUS"
            else
              echo "⚠️ $URL — $STATUS"
              FAILED="$FAILED $URL($STATUS)"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "Javob bermagan:$FAILED"
          fi
