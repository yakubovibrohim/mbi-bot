name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mbi-bot-yw9q.onrender.com/)
          echo "Server status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Server ishlayapti"
          else
            echo "⚠️ Server javob: $STATUS"
          fi
